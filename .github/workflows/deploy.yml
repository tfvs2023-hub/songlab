name: Deploy to GCP VM

  on:
    push:
      branches:
        - main

  jobs:
    deploy:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Deploy via SSH
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.SERVER_IP }}
            username: ${{ secrets.SERVER_USER }}
            key: ${{ secrets.SERVER_SSH_KEY }}
            script: |
              cd /srv/songlab
              sudo systemctl stop songlab-backend || true
              sudo rm -rf backend
              git clone https://github.com/tfvs2023-hub/songlab.git backend
              cd backend
              python3 -m venv .venv
              source .venv/bin/activate
              pip install -r requirements_v2.txt
              cat <<'EOS' | sudo tee run.sh > /dev/null
              #!/usr/bin/env bash
              . .venv/bin/activate
              export PYTHONUNBUFFERED=1
                  APP_MOD="main:app"
              fi
              exec python -m uvicorn "$APP_MOD" --host 127.0.0.1 --port 8002 --workers 2 --log-level info
              EOS
              sudo chmod +x run.sh
              sudo systemctl restart songlab-backend