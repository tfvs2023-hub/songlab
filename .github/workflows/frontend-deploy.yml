name: Deploy Frontend (sync frontend_temp)

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend_temp/**'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: "bash -l {0}"
    env:
      TARGET_DIR: /home/tfvs2023/app/dist

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH sanity check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            echo "SSH check: $(date)"
            id || true
            whoami || true
            uname -a || true
            ls -ld "$TARGET_DIR" || true

      # Ensure remote directory exists and has proper ownership
      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            TARGET_DIR=/home/tfvs2023/app/dist
            sudo mkdir -p "$TARGET_DIR"
            sudo chown -R ${{ secrets.SSH_USER }}: $TARGET_DIR || true

      # Normalize absolute asset URLs in the frontend files to local paths, then package into a tarball
      - name: Normalize asset URLs (make paths local)
        run: |
          # Replace legacy absolute /static/ URLs and host:port references to root-relative paths
          find frontend_temp -type f -name "*.html" -print0 | xargs -0 -n1 sed -i "s|http://www.songlab.kr:8001/static/|/|g"
          find frontend_temp -type f -name "*.html" -print0 | xargs -0 -n1 sed -i "s|https://www.songlab.kr:8001/static/|/|g"
          # Also replace any direct links to the hostname+port to root (script/style)
          find frontend_temp -type f -name "*.html" -print0 | xargs -0 -n1 sed -i "s|http://www.songlab.kr:8001/|/|g"
          find frontend_temp -type f -name "*.html" -print0 | xargs -0 -n1 sed -i "s|https://www.songlab.kr:8001/|/|g"

      - name: Create frontend tarball
        run: |
          tar -czf frontend_temp.tar.gz -C frontend_temp .
          echo "Tarball contents (first 50 lines):"
          tar -tzf frontend_temp.tar.gz | sed -n '1,50p' || true

      - name: Upload frontend tarball via SCP
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "frontend_temp.tar.gz"
          target: "/home/tfvs2023/app/"

      - name: Verify tarball on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            TAR=/home/tfvs2023/app/frontend_temp.tar.gz
            if [ -f "$TAR" ]; then
              echo "Found tarball on server: $TAR"
              ls -l "$TAR"
              if command -v sha256sum >/dev/null 2>&1; then sha256sum "$TAR" || true; fi
            else
              echo "ERROR: uploaded tarball not found at $TAR"
              ls -la /home/tfvs2023/app || true
              exit 1
            fi

      - name: Extract and swap frontend on server (atomic)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -xe
            TAR=/home/tfvs2023/app/frontend_temp.tar.gz
            TARGET_DIR=/home/tfvs2023/app/dist
            TMP_DIR=/home/tfvs2023/app/dist_new
            if [ -f "$TAR" ]; then
              echo "Tar contents (server-side) -- first 100 lines:"
              sudo tar -tzf "$TAR" | sed -n '1,100p' > /tmp/deploy_tar_listing.txt || true
              echo "Extracting $TAR to $TMP_DIR"
              sudo rm -rf "$TMP_DIR" || true
              sudo mkdir -p "$TMP_DIR"

              # Determine if archive contains a single top-level directory and use --strip-components=1 if so
              FIRST_ENTRY=$(sudo tar -tzf "$TAR" | head -n1 || true)
              EXTRA_FLAGS=""
              if echo "$FIRST_ENTRY" | grep -q '/'; then
                echo "Archive appears to contain a top-level directory. Will extract with --strip-components=1 to avoid nested folder. First entry: $FIRST_ENTRY"
                EXTRA_FLAGS="--strip-components=1"
              fi

              sudo tar -xzf "$TAR" -C "$TMP_DIR" $EXTRA_FLAGS
              sudo rm -f "$TAR" || true

              # Verify extracted content has required files at the root
              if [ ! -f "$TMP_DIR/index.html" ]; then
                echo "ERROR: extracted archive does not contain index.html at root of archive"
                sudo ls -la "$TMP_DIR" || true
                # show tar listing for diagnosing
                sudo sed -n '1,200p' /tmp/deploy_tar_listing.txt || true
                exit 1
              fi

              if [ ! -f "$TMP_DIR/style.css" ]; then
                echo "ERROR: extracted archive does not contain style.css at root of archive"
                sudo ls -la "$TMP_DIR" || true
                sudo sed -n '1,200p' /tmp/deploy_tar_listing.txt || true
                exit 1
              fi

              echo "Swapping $TMP_DIR into $TARGET_DIR"
              sudo rm -rf "${TARGET_DIR}_old" || true
              if [ -d "$TARGET_DIR" ]; then
                sudo mv "$TARGET_DIR" "${TARGET_DIR}_old"
              fi
              sudo mv "$TMP_DIR" "$TARGET_DIR"
              sudo chown -R ${{ secrets.SSH_USER }}: "$TARGET_DIR" || true

              # Post-deploy verification: request critical assets from local nginx. If they fail, rollback.
              echo "Validating deployed assets via local HTTP requests"
              set +e
              curl -sSf -I http://127.0.0.1/style.css -o /tmp/deploy_check_css.out
              CSS_OK=$?
              curl -sSf -I http://127.0.0.1/script.js -o /tmp/deploy_check_js.out
              JS_OK=$?
              set -e

              if [ "$CSS_OK" -ne 0 ]; then
                echo "ERROR: style.css did not return 200 after deploy — rolling back"
                echo "--- curl output (style.css) ---"
                cat /tmp/deploy_check_css.out || true
                sudo ls -la "$TARGET_DIR" || true
                sudo rm -rf "$TARGET_DIR" || true
                if [ -d "${TARGET_DIR}_old" ]; then
                  sudo mv "${TARGET_DIR}_old" "$TARGET_DIR"
                  sudo chown -R ${{ secrets.SSH_USER }}: "$TARGET_DIR" || true
                fi
                exit 1
              fi

              if [ "$JS_OK" -ne 0 ]; then
                echo "WARNING: script.js did not return 200 after deploy"
                echo "--- curl output (script.js) ---"
                cat /tmp/deploy_check_js.out || true
              fi

              # Cleanup: remove very old backups (older than 14 days)
              sudo find /home/tfvs2023/app -maxdepth 1 -type d -name 'dist_old*' -mtime +14 -exec rm -rf {} \; || true
            else
              echo "ERROR: frontend tarball not found at $TAR; aborting deploy"
              exit 1
            fi

      - name: Reload nginx on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            echo "Reloading nginx..."
            sudo systemctl reload nginx || true

# Required repository secrets (set these in GitHub Settings -> Secrets):
# - SSH_HOST: your.server.ip.or.hostname (e.g. 34.47.99.211)
# - SSH_USER: username to connect as (e.g. ubuntu)
# - SSH_PRIVATE_KEY: private key (PEM) for the SSH_USER
# - REMOTE_FRONTEND_DIR: path on server where files should be copied (e.g. /var/www/songlab)
# Optional: SSH_PORT (defaults to 22)
