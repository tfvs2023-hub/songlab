server {
    listen 80;
    server_name staging.songlab.kr;

    root /home/tfvs2023/app/staging;
    index index.html;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        alias /home/tfvs2023/app/staging/static/;
        try_files $uri $uri/ =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
}
