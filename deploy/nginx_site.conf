server {
    listen 80;
    server_name example.com; # replace

    root /var/www/songlab; # replace with $RemotePath used in deploy script
    index index.html;

    # Ensure UTF-8 charset to avoid Korean text corruption
    charset utf-8;
    add_header Content-Type "text/html; charset=utf-8" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend service (if backend runs on same host)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    error_log /var/log/nginx/songlab_error.log;
    access_log /var/log/nginx/songlab_access.log;
}
