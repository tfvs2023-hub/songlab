# Example nginx server block for SongLab static frontend
# Save to /etc/nginx/sites-available/songlab.conf and symlink to sites-enabled

server {
    listen 80;
    server_name www.songlab.kr songlab.kr;

    root /home/tfvs2023/app/dist;
    index index.html;

    # Serve static assets directly
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Support legacy absolute paths that used /static/
    location /static/ {
        alias /home/tfvs2023/app/dist/;
        try_files $uri $uri/ =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Optional: favicon and images
    location /images/ {
        alias /home/tfvs2023/app/dist/images/;
        access_log off;
        expires 7d;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;

    # Redirect http to https if you have TLS configured elsewhere
    # if ($scheme = http) {
    #   return 301 https://$host$request_uri;
    # }
}
