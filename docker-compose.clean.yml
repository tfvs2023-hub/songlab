version: '3.8'

services:
  vocal-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: advanced-vocal-analyzer
    ports:
      - "8080:8080"
    volumes:
      - "./audio_data:/app/audio_data"
      - "./logs:/app/logs"
      - "./overrides:/app/overrides:ro"  # optional, mount local overrides
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Seoul
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vocal-analyzer-dev
    ports:
      - "8888:8888"
    volumes:
      - "./:/app"
      - "./audio_data:/app/audio_data"
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      bash -c "pip install jupyter ipykernel matplotlib seaborn && \
               jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root"
    profiles:
      - dev
