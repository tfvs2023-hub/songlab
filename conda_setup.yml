# Conda 환경 설정 파일 (간소화 버전)
name: vocal-analyzer-advanced

channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  - python=3.10
  - pip
  - numpy
  - scipy
  - pytorch
  - torchaudio
  - fastapi
  - uvicorn
  
  # pip으로 나머지 설치
  - pip:
    - praat-parselmouth>=0.4.3
    - pyloudnorm>=0.1.0
    - soundfile>=0.12.0
    - python-multipart>=0.0.6
    - aiofiles>=23.0.0
    - pydantic>=2.0.0
    - essentia  # 최신 버전 시도